<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wildfire Risk Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Wildfire Risk Dashboard</h1>
      <p>
        Live data from the Cloud Run API for the wildfire prediction platform.
      </p>

      <div class="controls">
        <button id="loadBtn">Load Predictions</button>
      </div>

      <div id="status">Click "Load Predictions" to fetch data.</div>

      <table id="predictionsTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Grid ID</th>
            <th>Risk Score</th>
            <th>Risk Level</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Model</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script src="app.js"></script>
  </body>
</html>
